[tool.black]
line-length = 100
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.venv
  | build
  | dist
  | f469-disco
  | bootloader
  | \.bundle\.tar
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = [".venv", "f469-disco", "bootloader", ".bundle.tar"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
exclude = ["f469-disco", "bootloader", ".bundle.tar", "build"]


[tool.coverage]
run = { parallel = true
source = ["src/"]
 branch = true
omit = ["f469-disco/*", "bootloader/*", "test/*", ".venv/*"]

[tool.coverage.report]
exclude_lines = ["pragma: no cover", 
def __repr__", 
raise NotImplementedError"]
fail_under = 50